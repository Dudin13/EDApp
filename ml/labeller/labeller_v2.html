<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDudin Pro Labeller v3 - Dual Pane</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00d4aa;
            --secondary: #ffc800;
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-dim: #8899aa;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Toolbar */
        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 212, 170, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--primary); }

        .status-badge {
            background: rgba(0, 212, 170, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--panel-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        
        select, input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-family: inherit;
        }

        .img-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
        }
        .img-item {
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .img-item:hover { background: rgba(0, 212, 170, 0.1); }
        .img-item.active { background: var(--primary); color: #0f172a; font-weight: 600; }

        /* Workspace */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: #05070a;
            gap: 20px;
        }

        .pane-container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }

        .pane {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .pane-header {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .canvas-area {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        canvas {
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        /* Class Selector */
        .classes-bar {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .class-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }
        .class-btn.active {
            border-color: var(--primary);
            color: white;
            background: rgba(0, 212, 170, 0.1);
            box-shadow: 0 0 10px rgba(0, 212, 170, 0.2);
        }

        /* Action Buttons */
        .pane-actions {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        button.primary {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button.primary:active { transform: scale(0.98); }

        button.outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
        }
        button.outline:hover { background: rgba(255,255,255,0.05); }

        .footer-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        #coords { font-size: 11px; color: var(--text-dim); font-family: monospace; }

        .class-0 { color: #ff0000; } /* Local */
        .class-1 { color: #0000ff; } /* Visitante */
        .class-2 { color: #ffa500; } /* GK */
        .class-3 { color: #ffff00; } /* Referee */
        .class-4 { color: #ffffff; } /* Ball */
    </style>
</head>
<body>

<header>
    <div class="logo">E<span>DUDIN</span> PRO LABELLER</div>
    <div id="status" class="status-badge">Conectando...</div>
</header>

<main>
    <aside style="display: flex; flex-direction: column; height: 100%;">
        <div style="flex-shrink: 0; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
            <button onclick="aiPredict()" class="primary" style="width: 100%; margin-bottom: 10px;">🤖 IA PREDICT (YOLO)</button>
            <button onclick="nextImage()" class="primary" style="width: 100%; margin-bottom: 10px; background: #6366f1;">⏭️ SIGUIENTE IMAGEN</button>
            <div style="background: rgba(255, 200, 0, 0.1); padding: 10px; border-radius: 8px; border: 1px solid var(--secondary);">
                <p style="font-size: 11px; margin: 0 0 8px 0; color: var(--secondary); font-weight: 700;">MODO CLICK AUTOMÁTICO (SAM)</p>
                <p style="font-size: 10px; margin: 0; color: var(--text-dim);">Haz CLICK NORMAL en un jugador para que la IA cree la caja sola.</p>
            </div>
        </div>

        <div class="form-group">
            <label>Conjunto de Datos</label>
            <select id="subsetSelect" onchange="loadImages()">
                <option value="veo_frames_raw">VEO Frames Nuevos</option>
                <option value="imagenes_entrenamiento">Todas las Imagenes</option>
                <option value="combined">Todo el Dataset (Mix)</option>
                <option value="nuevas_muestras_marzo">Nuevas Muestras (Marzo)</option>
                <option value="super_focused_50">Super Focused (50)</option>
                <option value="train">Entrenamiento</option>
                <option value="val">Validación</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <label>Imágenes (<span id="imgCount">0</span>)</label>
            <div id="imageList" class="img-list"></div>
        </div>
        <div style="padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px;">
            <button onclick="clearLabels()" class="outline" style="width: 100%;">🗑️ Limpiar Imagen</button>
        </div>
    </aside>

    <div class="workspace">
        <div class="classes-bar">
            <button class="class-btn active" data-id="0" onclick="setClass(0)">🟢 PLAYER</button>
            <button class="class-btn" data-id="1" onclick="setClass(1)">🟠 GOALKEEPER</button>
            <button class="class-btn" data-id="2" onclick="setClass(2)">🔵 REFEREE</button>
            <button class="class-btn" data-id="3" onclick="setClass(3)">🟡 BALL</button>
            <button class="class-btn" data-id="4" onclick="setClass(4)">🔴 EQUIPO A</button>
            <button class="class-btn" data-id="5" onclick="setClass(5)">🔵 EQUIPO B</button>
        </div>

        <div class="pane-container">
            <!-- Left Pane: AI Reference -->
            <div class="pane">
                <div class="pane-header">
                    <span>PANEL IZQUIERDA: IA ASISTIDA</span>
                    <span style="color: var(--primary);">MODO LECTURA</span>
                </div>
                <div class="canvas-area">
                    <canvas id="canvas_ai"></canvas>
                </div>
            </div>

            <!-- Right Pane: Manual Tool -->
            <div class="pane" style="border-color: var(--secondary);">
                <div class="pane-header">
                    <span>PANEL DERECHA: ENTRENAMIENTO MANUAL</span>
                    <span style="color: var(--secondary);">MODO EDICIÓN</span>
                </div>
                <div class="canvas-area">
                    <canvas id="canvas_manual"></canvas>
                </div>
            </div>
        </div>

        <div class="footer-controls">
            <div id="coords">X: 0, Y: 0 | Zoom: 100%</div>
            <div style="font-size: 10px; color: var(--text-dim);" id="savePath">Guardando en: ml/data/datasets/...</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <label style="margin:0; font-size:10px;">ZOOM:</label>
                <input type="range" id="zoomRange" min="10" max="2000" value="100" oninput="updateZoomForce(this.value)" style="width: 120px;">
                <button onclick="deleteSelected()" id="deleteBtn" class="outline" style="color: #ff4444; border-color: rgba(255,68,68,0.3); display: none;">❌ BORRAR</button>
                <button onclick="saveFromIA()" class="outline">📥 USAR IA (IZQ)</button>
                <button onclick="saveManual()" class="primary">💾 GUARDAR MANUAL (DER)</button>
            </div>
        </div>
    </div>
</main>

<script>
    const API_URL = window.location.origin;
    let currentSubset = "combined";
    let currentFile = "";
    let images = [];
    let labelsAI = [];
    let labelsManual = [];
    let currentClass = 0;
    
    // Canvas & Zoom State
    const cAI = document.getElementById('canvas_ai');
    const cManual = document.getElementById('canvas_manual');
    const ctxAI = cAI.getContext('2d');
    const ctxManual = cManual.getContext('2d');
    let bgImg = new Image();
    
    let scale = 1.0;
    let offsetX = 0;
    let offsetY = 0;

    // Mouse Tracking
    let isDrawing = false;
    let isPanning = false;
    let isSpacePressed = false;
    let startX, startY;
    let panStartX, panStartY;
    let samPoint = null;
    let samLoadingPoint = null;
    let selectedIdx = -1;

    const classColors = ["#32c832", "#ffa532", "#3232ff", "#ffff00", "#ff0000", "#0088ff"];

    async function init() {
        try {
            const resp = await fetch(`${API_URL}/api/images/${currentSubset}`);
            if (!resp.ok) throw new Error("API Offline");
            document.getElementById('status').innerText = "Backend Conectado";
            loadImages();
        } catch (e) {
            document.getElementById('status').innerText = "Error: Backend Offline";
            document.getElementById('status').style.background = "rgba(255,0,0,0.1)";
            document.getElementById('status').style.color = "#ff4444";
        }
    }

    async function loadImages() {
        currentSubset = document.getElementById('subsetSelect').value;
        const resp = await fetch(`${API_URL}/api/images/${currentSubset}`);
        const data = await resp.json();

        // Soporte para formato nuevo {name, corregida} y formato antiguo string
        images = data.map(item => typeof item === "string" ? item : item.name);
        const corregidas = new Set(
            data.filter(item => typeof item === "object" && item.corregida)
                .map(item => item.name)
        );

        const total = images.length;
        const nCorregidas = corregidas.size;
        document.getElementById('imgCount').innerText = `${total} (${nCorregidas} ✅)`;

        const list = document.getElementById('imageList');
        list.innerHTML = "";
        data.forEach(item => {
            const name = typeof item === "string" ? item : item.name;
            const corregida = typeof item === "object" && item.corregida;
            const div = document.createElement('div');
            div.className = "img-item";
            div.style.color = corregida ? "#00d4aa" : "";
            div.innerText = (corregida ? "✅ " : "") + name;
            div.onclick = () => selectImage(name, div);
            list.appendChild(div);
        });

        if (images.length > 0 && !currentFile) {
            selectImage(images[0], list.firstChild);
        }
    }

    function selectImage(filename, el) {
        currentFile = filename;
        document.querySelectorAll('.img-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        bgImg.onload = () => {
            resetCanvases();
            draw();
        };
        bgImg.src = `${API_URL}/api/image/${currentSubset}/${filename}`;
        
        labelsAI = [];
        labelsManual = [];
        selectedIdx = -1;
        document.getElementById('deleteBtn').style.display = "none";
        document.getElementById('savePath').innerText = `Guardando en: ml/data/datasets/${currentSubset}/labels/`;
    }

    function resetCanvases() {
        const aspect = bgImg.height / bgImg.width;
        const container = cAI.parentElement;
        const w = container.clientWidth;
        const h = w * aspect;
        
        [cAI, cManual].forEach(c => {
            c.width = w;
            c.height = h;
        });
        
        scale = 1.0;
        offsetX = 0;
        offsetY = 0;
        selectedIdx = -1;
        document.getElementById('zoomRange').value = 100;
    }

    function updateZoomForce(val) {
        // Simple slider zoom (centered)
        const oldScale = scale;
        const newScale = val / 100;
        const factor = newScale / oldScale;
        
        const centerX = cManual.width / 2;
        const centerY = cManual.height / 2;
        
        offsetX = centerX - (centerX - offsetX) * factor;
        offsetY = centerY - (centerY - offsetY) * factor;
        scale = newScale;

        document.getElementById('zoomRange').value = val;
        draw();
    }

    // Helper: get image coordinates from mouse event
    function getImgCoords(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        // Transform mouse coords to image space
        const x = (mouseX - offsetX) / (canvas.width * scale);
        const y = (mouseY - offsetY) / (canvas.height * scale);
        return { x, y };
    }

    function setClass(id) {
        currentClass = id;
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        // Unselect when changing class for new boxes
        selectedIdx = -1;
        document.getElementById('deleteBtn').style.display = "none";
        draw();
    }

    // AI Prediction
    async function aiPredict() {
        if (!currentFile) return;
        document.getElementById('status').innerText = "🤖 IA Pensando...";
        try {
            const resp = await fetch(`${API_URL}/api/predict_data/${currentSubset}/${currentFile}`);
            const detections = await resp.json();
            
            // Populate AI Pane
            labelsAI = detections.map(d => ({
                cls: d.cls,
                points: d.points
            }));

            // Copy to Manual Pane for refinement
            labelsManual = detections.map(d => {
                // Convert polygon (points) to bounding box for simpler manual editing
                const points = d.points;
                const xs = points.map(p => p[0]);
                const ys = points.map(p => p[1]);
                return {
                    cls: d.cls,
                    x1: Math.min(...xs),
                    y1: Math.min(...ys),
                    x2: Math.max(...xs),
                    y2: Math.max(...ys)
                };
            });

            document.getElementById('status').innerText = "✅ IA Lista";
            draw();
        } catch (e) { 
            console.error(e); 
            document.getElementById('status').innerText = "❌ Error en IA";
        }
    }

    async function samPredict(point) {
        if (!currentFile || !point) return;
        samLoadingPoint = point; // Show pulsing feedback
        samPoint = point; // Show permanent target
        draw();
        
        console.log("Segmenting point:", point);
        document.getElementById('status').innerText = "✨ SAM Autodetectando...";
        try {
            const resp = await fetch(`${API_URL}/api/segment`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    subset: currentSubset,
                    filename: currentFile,
                    point: { x: point.x, y: point.y }
                })
            });
            const data = await resp.json();
            samLoadingPoint = null; 
            
            if (data.polygon) {
                console.log("SAM Match! Polygon found.");
                const xs = data.polygon.map(p => p[0]);
                const ys = data.polygon.map(p => p[1]);
                labelsManual.push({
                    cls: currentClass,
                    x1: Math.min(...xs), y1: Math.min(...ys),
                    x2: Math.max(...xs), y2: Math.max(...ys)
                });
                document.getElementById('status').innerText = "✨ SAM Listo";
            } else {
                console.warn("SAM Error:", data.error || "No mask found");
                document.getElementById('status').innerText = "❌ No se detectó jugador";
            }
            draw();
        } catch (e) {
            console.error("SAM API Failed:", e);
            samLoadingPoint = null;
            document.getElementById('status').innerText = "❌ Error SAM (API)";
            draw();
        }
    }

    // Event Handling with Zoom/Pan Support
    cManual.oncontextmenu = (e) => e.preventDefault(); // Disable for Right-Click Pan

    cManual.onmousedown = (e) => {
        const coords = getImgCoords(e, cManual);
        
        // Pan with Right Click (button 2) OR Middle Click (button 1) OR Spacebar
        if (e.button === 2 || e.button === 1 || isSpacePressed) { 
            isPanning = true;
            panStartX = e.clientX - offsetX;
            panStartY = e.clientY - offsetY;
            return;
        }

        if (e.button !== 0) return; // Only Left Click for interaction

        // Selection Check (More sensitive)
        let hit = -1;
        const pad = 0.02 / scale;
        labelsManual.forEach((l, idx) => {
            if (coords.x >= l.x1 - pad && coords.x <= l.x2 + pad && coords.y >= l.y1 - pad && coords.y <= l.y2 + pad) {
                hit = idx;
            }
        });
        
        if (hit !== -1) {
            selectedIdx = hit;
            document.getElementById('deleteBtn').style.display = "block";
            isDrawing = false;
        } else {
            selectedIdx = -1;
            document.getElementById('deleteBtn').style.display = "none";
            
            // Start tracking for potential drag (manual box) or click (SAM)
            startX = coords.x;
            startY = coords.y;
            isDrawing = true;
        }
        draw();
    };

    cManual.onmousemove = (e) => {
        const coords = getImgCoords(e, cManual);
        document.getElementById('coords').innerText = `X: ${Math.round(coords.x * 100)}%, Y: ${Math.round(coords.y * 100)}% | Zoom: ${Math.round(scale*100)}%`;

        if (isPanning) {
            offsetX = e.clientX - panStartX;
            offsetY = e.clientY - panStartY;
            cManual.style.cursor = "move";
            draw();
            return;
        }

        // Update cursor visual
        if (isSpacePressed) {
            cManual.style.cursor = "grab";
        } else {
            // Check if hovering over a box
            let hit = false;
            const pad = 0.02 / scale;
            labelsManual.forEach(l => {
                if (coords.x >= l.x1 - pad && coords.x <= l.x2 + pad && coords.y >= l.y1 - pad && coords.y <= l.y2 + pad) hit = true;
            });
            cManual.style.cursor = hit ? "pointer" : "crosshair";
        }

        if (isDrawing) draw();
    };

    cManual.onmouseup = (e) => {
        if (isPanning) { 
            isPanning = false; 
            return; 
        }
        if (!isDrawing) return;
        isDrawing = false;
        
        const coords = getImgCoords(e, cManual);
        const endX = coords.x;
        const endY = coords.y;
        
        const dist = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
        
        // If it was a CLICK -> Trigger SAM (Threshold increased to 0.01 for better usability)
        if (dist < 0.01) {
             samPredict({x: startX, y: startY});
        } 
        // If it was a drag -> Normal Box
        else if (Math.abs(endX - startX) > 0.005 && Math.abs(endY - startY) > 0.005) {
            labelsManual.push({
                cls: currentClass,
                x1: Math.min(startX, endX),
                y1: Math.min(startY, endY),
                x2: Math.max(startX, endX),
                y2: Math.max(startY, endY)
            });
        }
        draw();
    };

    // Keyboard Events
    window.onkeydown = (e) => {
        if (e.code === "Space") {
            isSpacePressed = true;
        }
        if (e.key === "Delete" || e.key === "Backspace") {
            if (selectedIdx !== -1) {
                deleteSelected();
            }
        }
    };

    window.onkeyup = (e) => {
        if (e.code === "Space") {
            isSpacePressed = false;
        }
    };

    // Zoom with scrollwheel (Zoom to cursor) - ONLY WITH CTRL
    cManual.onwheel = (e) => {
        if (!e.ctrlKey) return; // REQUIRED: Hold CTRL to zoom
        
        e.preventDefault();
        const rect = cManual.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const zoomIntensity = 0.1;
        const delta = e.deltaY > 0 ? -zoomIntensity : zoomIntensity;
        const newScale = Math.min(Math.max(0.1, scale * (1 + delta)), 25);
        
        const factor = newScale / scale;
        offsetX = mouseX - (mouseX - offsetX) * factor;
        offsetY = mouseY - (mouseY - offsetY) * factor;
        
        scale = newScale;
        document.getElementById('zoomRange').value = Math.round(scale * 100);
        draw();
    };

    function updateZoomForce(newScaleValue) {
        const oldScale = scale;
        scale = Math.min(Math.max(0.1, newScaleValue / 100), 25); // Convert percentage to scale
        
        const factor = scale / oldScale;

        // Center of the canvas for slider zoom
        const centerX = cManual.width / 2;
        const centerY = cManual.height / 2;

        // The point under the cursor should remain at the same position relative to the cursor
        // (mouseX - offsetX_new) = (mouseX - offsetX_old) * factor
        offsetX = centerX - (centerX - offsetX) * factor;
        offsetY = centerY - (centerY - offsetY) * factor;
        
        document.getElementById('zoomRange').value = Math.round(scale * 100);
        draw();
    }

    function deleteSelected() {
        if (selectedIdx !== -1) {
            labelsManual.splice(selectedIdx, 1);
            selectedIdx = -1;
            document.getElementById('deleteBtn').style.display = "none";
            draw();
        }
    }

    function draw() {
        [ctxAI, ctxManual].forEach(ctx => {
            const canvas = ctx.canvas;
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        });

        // Draw AI Labels (Left)
        labelsAI.forEach(l => {
            ctxAI.strokeStyle = classColors[l.cls] || "#fff";
            ctxAI.lineWidth = 1/scale * 2;
            ctxAI.beginPath();
            l.points.forEach((p, i) => {
                if (i === 0) ctxAI.moveTo(p[0] * cAI.width, p[1] * cAI.height);
                else ctxAI.lineTo(p[0] * cAI.width, p[1] * cAI.height);
            });
            ctxAI.closePath();
            ctxAI.stroke();
        });

        // Draw Manual Labels (Right)
        labelsManual.forEach((l, idx) => {
            const isSelected = (idx === selectedIdx);
            ctxManual.strokeStyle = isSelected ? "#00ff00" : (classColors[l.cls] || "#fff");
            ctxManual.lineWidth = (isSelected ? 4 : 3) / scale;
            
            const x = l.x1 * cManual.width;
            const y = l.y1 * cManual.height;
            const w = (l.x2 - l.x1) * cManual.width;
            const h = (l.y2 - l.y1) * cManual.height;
            ctxManual.strokeRect(x, y, w, h);
            
            ctxManual.fillStyle = classColors[l.cls] || "#fff";
            ctxManual.globalAlpha = isSelected ? 0.4 : 0.2;
            ctxManual.fillRect(x, y, w, h);
            ctxManual.globalAlpha = 1.0;
        });

        // Update zoom text info
        document.getElementById('coords').innerText = `X: ${Math.round(offsetX)}, Y: ${Math.round(offsetY)} | Zoom: ${Math.round(scale*100)}%`;

        // Draw SAM Loading/Point
        if (samLoadingPoint || samPoint) {
            const p = samLoadingPoint || samPoint;
            ctxManual.fillStyle = samLoadingPoint ? "rgba(0, 212, 170, 0.8)" : "#ff0";
            ctxManual.beginPath();
            ctxManual.arc(p.x * cManual.width, p.y * cManual.height, 8/scale, 0, Math.PI * 2);
            ctxManual.fill();
            ctxManual.strokeStyle = "white";
            ctxManual.lineWidth = 2/scale;
            ctxManual.stroke();
            
            if (samLoadingPoint) {
                // Pulse effect
                const pulse = (Date.now() % 1000) / 1000;
                ctxManual.beginPath();
                ctxManual.arc(p.x * cManual.width, p.y * cManual.height, (10 + pulse * 10)/scale, 0, Math.PI * 2);
                ctxManual.stroke();
                requestAnimationFrame(draw); // Keep pulse moving
            }
        }
    }

    async function saveFromIA() {
        // Just copy AI labels exactly if needed
        const yoloLabels = labelsAI.map(l => {
            // Logic to convert polygon to YOLO format (assuming class x1 y1 x2 y2... for segment)
            const ptsStr = l.points.map(p => `${p[0].toFixed(6)} ${p[1].toFixed(6)}`).join(" ");
            return `${l.cls} ${ptsStr}`;
        });
        saveGeneric(yoloLabels);
    }

    function nextImage() {
        const idx = images.indexOf(currentFile);
        if (idx !== -1 && idx < images.length - 1) {
            const nextFile = images[idx + 1];
            const items = document.querySelectorAll('.img-item');
            selectImage(nextFile, items[idx + 1]);
            // Scroll into view
            items[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    async function saveManual() {
        const yoloLabels = labelsManual.map(l => {
            const cx = (l.x1 + l.x2) / 2;
            const cy = (l.y1 + l.y2) / 2;
            const w = l.x2 - l.x1;
            const h = l.y2 - l.y1;
            return `${l.cls} ${cx.toFixed(6)} ${cy.toFixed(6)} ${w.toFixed(6)} ${h.toFixed(6)}`;
        });
        saveGeneric(yoloLabels);
    }

    async function saveGeneric(yoloLabels) {
        if (!currentFile) return;
        const resp = await fetch(`${API_URL}/api/save_labels`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                subset: currentSubset,
                filename: currentFile,
                labels: yoloLabels
            })
        });
        if (resp.ok) {
            document.getElementById('status').innerText = "💾 Guardadas: " + currentFile;
            document.getElementById('status').style.color = "var(--primary)";
        }
    }

    function st_initial_labels() {
        // Mocking AI for demo of the pane
        labelsAI = []; 
    }

    function clearLabels() {
        if (confirm("¿Borrar TODAS las marcas de esta imagen?")) {
            labelsManual = [];
            selectedIdx = -1;
            document.getElementById('deleteBtn').style.display = "none";
            draw();
        }
    }

    init();
</script>
