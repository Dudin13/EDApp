<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Reviewer - Super Focused (50)</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #00d4aa;
            --text: #f8fafc;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background: rgba(15, 23, 42, 0.5);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .image-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .image-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .image-item:hover { background: rgba(0,212,170,0.1); }
        .image-item.active { background: var(--accent); color: #000; font-weight: bold; }

        .editor-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }
        .controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.8);
            padding: 1rem;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,212,170,0.3);
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); }
        button.secondary { background: #475569; color: white; }
        
        .class-selector {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .class-btn {
            text-align: left;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            background: #1e293b;
            color: #fff;
            border: 1px solid transparent;
        }
        .class-btn.active { border-color: var(--accent); background: rgba(0,212,170,0.2); }
        
        .legend {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0; font-size: 1.2rem;">⚽ Dataset Researcher <span style="color: var(--accent); font-size: 0.9rem; margin-left: 10px;">SUPER FOCUSED (50)</span></h2>
    </div>
    <div id="status">Cargando...</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <h3>Imágenes</h3>
        <select id="subsetSelect" onchange="loadImages()" style="padding: 0.5rem; border-radius: 4px; background: #1e293b; color: #fff; border: 1px solid #334155;">
            <option value="super_focused_50">Super Focused (50)</option>
            <option value="valid">Validación</option>
            <option value="train">Entrenamiento</option>
        </select>
        <div class="image-list" id="image-list"></div>
        
        <div class="class-selector">
            <strong>Clases (0-5)</strong>
            <button class="class-btn active" data-cls="0">0: Team 1</button>
            <button class="class-btn" data-cls="1">1: Team 2</button>
            <button class="class-btn" data-cls="2">2: Goalkeeper 1</button>
            <button class="class-btn" data-cls="3">3: Referee</button>
            <button class="class-btn" data-cls="4">4: Ball</button>
            <button class="class-btn" data-cls="5">5: Goalkeeper 2</button>
        </div>
        
        <div class="legend">
            A/D: Navegar | S: Guardar | Z: Magic Click (SAM) | P: Predecir IA
        </div>
    </div>
    
    <div class="editor-area">
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="predictIA()">P: Predecir con IA</button>
            <button onclick="useSAM()" class="secondary">Z: Magic Click (SAM)</button>
            <button onclick="saveLabels()">S: Guardar Etiquetas</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5000/api";
    let images = [];
    let currentIndex = 0;
    let currentSubset = "super_focused_50";
    let polygons = [];
    let selectedClass = 0;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgObj = new Image();

    async function loadImages() {
        try {
            const resp = await fetch(`${API_BASE}/images/${currentSubset}`);
            images = await resp.json();
            renderImageList();
            if (images.length > 0) loadImage(0);
        } catch (err) {
            document.getElementById('status').innerText = "Error: Backend no conectado";
        }
    }

    function renderImageList() {
        const list = document.getElementById('image-list');
        list.innerHTML = images.map((img, i) => `
            <div class="image-item ${i === currentIndex ? 'active' : ''}" onclick="loadImage(${i})">
                ${img}
            </div>
        `).join('');
    }

    function loadImage(index) {
        currentIndex = index;
        const filename = images[currentIndex];
        imgObj.src = `${API_BASE}/image/${currentSubset}/${filename}`;
        imgObj.onload = () => {
            canvas.width = imgObj.width;
            canvas.height = imgObj.height;
            draw();
            renderImageList();
            document.getElementById('status').innerText = `Revisando: ${filename}`;
        };
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgObj, 0, 0);
        
        // Draw polygons
        polygons.forEach((poly, i) => {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = varToColor(poly.cls);
            ctx.fillStyle = varToColor(poly.cls, 0.3);
            
            poly.points.forEach((p, j) => {
                if (j === 0) ctx.moveTo(p[0] * canvas.width, p[1] * canvas.height);
                else ctx.lineTo(p[0] * canvas.width, p[1] * canvas.height);
            });
            ctx.closePath();
            ctx.stroke();
            ctx.fill();
        });
    }

    function varToColor(cls, alpha = 1) {
        const colors = [
            `rgba(255, 0, 0, ${alpha})`,   // 0: Red (Team 1)
            `rgba(0, 0, 255, ${alpha})`,   // 1: Blue (Team 2)
            `rgba(255, 165, 0, ${alpha})`, // 2: Orange (GK 1)
            `rgba(255, 255, 0, ${alpha})`, // 3: Yellow (Ref)
            `rgba(255, 255, 255, ${alpha})`, // 4: White (Ball)
            `rgba(0, 255, 0, ${alpha})`    // 5: Green (GK 2)
        ];
        return colors[cls] || `rgba(255,255,255,${alpha})`;
    }

    async function predictIA() {
        const filename = images[currentIndex];
        document.getElementById('status').innerText = "IA pensando...";
        // In reviewer we just show the predicted image directly for verification
        const predUrl = `${API_BASE}/predict/${currentSubset}/${filename}`;
        const predImg = new Image();
        predImg.src = predUrl;
        predImg.onload = () => {
            ctx.drawImage(predImg, 0, 0);
            document.getElementById('status').innerText = "Predicción IA cargada";
        };
    }

    async function useSAM() {
        // Simple placeholder for SAM interaction logic
        document.getElementById('status').innerText = "Pulsa en la imagen para Magic Click (SAM)";
        canvas.onclick = async (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            document.getElementById('status').innerText = "SAM trabajando...";
            const resp = await fetch(`${API_BASE}/segment`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    subset: currentSubset,
                    filename: images[currentIndex],
                    point: {x, y}
                })
            });
            const data = await resp.json();
            if (data.polygon) {
                polygons.push({cls: selectedClass, points: data.polygon});
                draw();
                document.getElementById('status').innerText = "Segmento añadido";
            } else {
                document.getElementById('status').innerText = "No se encontró máscara";
            }
            canvas.onclick = null;
        };
    }

    async function saveLabels() {
        const filename = images[currentIndex];
        const labels = polygons.map(p => {
            const pts = p.points.map(pt => `${pt[0].toFixed(5)} ${pt[1].toFixed(5)}`).join(" ");
            return `${p.cls} ${pts}`;
        });
        
        await fetch(`${API_BASE}/save_labels`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                subset: currentSubset,
                filename: filename,
                labels: labels
            })
        });
        document.getElementById('status').innerText = "ETIQUETAS GUARDADAS ✅";
    }

    // Navegación
    window.onkeydown = (e) => {
        if (e.key === 'd' || e.key === 'D') loadImage((currentIndex + 1) % images.length);
        if (e.key === 'a' || e.key === 'A') loadImage((currentIndex - 1 + images.length) % images.length);
        if (e.key === 's' || e.key === 'S') saveLabels();
        if (e.key === 'z' || e.key === 'Z') useSAM();
        if (e.key === 'p' || e.key === 'P') predictIA();
        if (e.key >= '0' && e.key <= '5') {
            selectedClass = parseInt(e.key);
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-cls="${selectedClass}"]`).classList.add('active');
        }
    };

    document.querySelectorAll('.class-btn').forEach(btn => {
        btn.onclick = () => {
            selectedClass = parseInt(btn.dataset.cls);
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });

    document.getElementById('subset-select').onchange = (e) => {
        currentSubset = e.target.value;
        loadImages();
    };

    loadImages();
</script>

</body>
</html>
