<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDudin Revision Tool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { margin: 0; font-family: 'Inter', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        header { background: #222; padding: 1rem; border-bottom: 2px solid #00d4aa; display: flex; justify-content: space-between; align-items: center; }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: #2a2a2a; border-right: 1px solid #444; display: flex; flex-direction: column; padding: 1rem; }
        #canvas-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        canvas { max-width: 100%; max-height: 100%; cursor: crosshair; }
        .img-list { flex: 1; overflow-y: auto; margin-top: 1rem; border: 1px solid #444; border-radius: 4px; }
        .img-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .img-item:hover { background: #333; }
        .img-item.active { background: #00d4aa; color: #000; font-weight: bold; }
        .controls { display: flex; gap: 10px; padding: 1rem; background: #222; border-top: 1px solid #444; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #00d4aa; color: #000; }
        .btn-outline { background: transparent; border: 1px solid #00d4aa; color: #00d4aa; }
        .class-selector { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
        .class-btn { font-size: 0.7rem; padding: 5px; background: #444; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
        .class-btn.active { background: #00d4aa; color: #000; border-color: #00d4aa; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold;">EDUDIN <span style="color: #00d4aa;">REVISION</span></div>
        <div id="file-info" style="font-size: 0.9rem;">Seleccione una imagen</div>
    </header>
    <main>
        <div id="sidebar">
            <div class="class-selector">
                <button class="class-btn active" data-id="0">Jugador</button>
                <button class="class-btn" data-id="1">Portero</button>
                <button class="class-btn" data-id="2">Árbitro</button>
                <button class="class-btn" data-id="3">Balón</button>
                <button class="class-btn" data-id="4">Equipo A</button>
                <button class="class-btn" data-id="5">Equipo B</button>
            </div>
            <button class="btn-primary" onclick="saveCurrent()" style="width: 100%;">💾 GUARDAR CAMBIOS</button>
            <div id="img-list" class="img-list"></div>
        </div>
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>
    <div class="controls">
        <button class="btn-outline" onclick="prevImg()">⬅️ ANTERIOR</button>
        <button class="btn-outline" onclick="nextImg()">SIGUIENTE ➡️</button>
        <div style="flex: 1;"></div>
        <button class="btn-outline" onclick="clearLabels()" style="color: #ff4444; border-color: #ff4444;">Limpiar</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentFile = "";
        let labels = [];
        let images = [];
        let img = new Image();
        let currentClass = 0;
        let isDrawing = false;
        let startX, startY;

        const colors = ["#00ff00", "#ff0000", "#0000ff", "#ffff00", "#ff00ff", "#00ffff"];

        async function init() {
            const resp = await fetch('/api/images');
            images = await resp.json();
            const list = document.getElementById('img-list');
            images.forEach(f => {
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerText = f;
                div.onclick = () => selectImage(f, div);
                list.appendChild(div);
            });
            if (images.length > 0) selectImage(images[0], list.firstChild);
        }

        async function selectImage(filename, el) {
            currentFile = filename;
            document.querySelectorAll('.img-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ block: 'nearest' });
            document.getElementById('file-info').innerText = filename;

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                loadLabels();
            };
            img.src = '/api/image/' + filename;
        }

        async function loadLabels() {
            const resp = await fetch('/api/load_labels/' + currentFile);
            const data = await resp.json();
            labels = (data.labels || []).map(line => {
                const parts = line.split(' ').map(Number);
                return { cls: parts[0], cx: parts[1], cy: parts[2], w: parts[3], h: parts[4] };
            });
            draw();
        }

        function draw() {
            ctx.drawImage(img, 0, 0);
            labels.forEach((l, idx) => {
                const x = (l.cx - l.w/2) * canvas.width;
                const y = (l.cy - l.h/2) * canvas.height;
                const w = l.w * canvas.width;
                const h = l.h * canvas.height;
                ctx.strokeStyle = colors[l.cls % colors.length];
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.globalAlpha = 0.2;
                ctx.fillRect(x, y, w, h);
                ctx.globalAlpha = 1.0;
            });
        }

        function clearLabels() { labels = []; draw(); }

        async function saveCurrent() {
            const lines = labels.map(l => `${l.cls} ${l.cx.toFixed(6)} ${l.cy.toFixed(6)} ${l.w.toFixed(6)} ${l.h.toFixed(6)}`);
            await fetch('/api/save_labels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: currentFile, labels: lines })
            });
            alert("Guardado!");
        }

        function nextImg() {
            const idx = images.indexOf(currentFile);
            if (idx < images.length - 1) selectImage(images[idx+1], document.querySelectorAll('.img-item')[idx+1]);
        }
        function prevImg() {
            const idx = images.indexOf(currentFile);
            if (idx > 0) selectImage(images[idx-1], document.querySelectorAll('.img-item')[idx-1]);
        }

        // Simplest manual drawing
        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            startX = (e.clientX - rect.left) / rect.width;
            startY = (e.clientY - rect.top) / rect.height;
            isDrawing = true;
        };
        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const endX = (e.clientX - rect.left) / rect.width;
            const endY = (e.clientY - rect.top) / rect.height;
            const cx = (startX + endX) / 2;
            const cy = (startY + endY) / 2;
            const w = Math.abs(endX - startX);
            const h = Math.abs(endY - startY);
            if (w > 0.001 && h > 0.001) {
                labels.push({ cls: currentClass, cx, cy, w, h });
            }
            isDrawing = false;
            draw();
        };

        document.querySelectorAll('.class-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentClass = parseInt(btn.dataset.id);
            };
        });

        init();
    </script>
</body>
</html>
